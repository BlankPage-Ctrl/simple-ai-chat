name: Build

on:
  push:
    branches: ["*"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [linux-x64, windows-x64]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install UI dependencies
        working-directory: ui
        run: bun install

      - name: Build UI
        run: bun run build:ui

      - name: Embed UI assets
        run: bun run build:embed

      - name: Compile binary (${{ matrix.target }})
        run: bun build --compile --target=bun-${{ matrix.target }} --outfile=simple-chat${{ matrix.target == 'windows-x64' && '.exe' || '' }} ./src/index.ts

      - uses: actions/upload-artifact@v4
        with:
          name: simple-chat-${{ matrix.target }}
          path: simple-chat*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: simple-chat-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: simple-chat*
          generate_release_notes: true
